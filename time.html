<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Clock - vClock Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Topbar -->
  <header class="topbar">
    <div class="left"></div>
    <div class="right">
      <button id="theme-toggle">🌙</button>
      <button id="settings-btn">⚙️</button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">vClock</div>
    <nav class="nav">
      <a href="index.html" class="nav-item">Alarm Clock</a>
      <a href="timer.html" class="nav-item">Timer</a>
      <a href="stopwatch.html" class="nav-item">Stopwatch</a>
      <a href="time.html" class="nav-item active">Time</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main id="main">
    <div id="main-column">
      <div id="clock-container">
        <h2>World Clock</h2>
        <p class="subline">Current local time in popular cities</p>
      </div>

      <section class="panel">
        <h3>Popular Cities</h3>
        <ul id="world-times" class="world-list"></ul>
        <button id="add-city" class="add-btn">➕ Add City</button>
      </section>

      <section class="panel">
        <p>
          More times available at 
          <a href="https://vclock.com/time/" target="_blank">https://vclock.com/time/</a>
        </p>
      </section>

      <section class="panel social-share">
        <h3>Share</h3>
        <div class="social-icons">
          <a href="#"><img src="icons/facebook.png" alt="Facebook"></a>
          <a href="#"><img src="icons/twitter.png" alt="Twitter"></a>
          <a href="#"><img src="icons/linkedin.png" alt="LinkedIn"></a>
          <a href="#"><img src="icons/reddit.png" alt="Reddit"></a>
        </div>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
