<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vClock Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top Navigation -->
  <header>
    <div class="top-left">
      <a href="#">Holidays</a>
      <div class="dropdown">
        <button class="dropbtn">Tools ▼</button>
        <div class="dropdown-content">
          <a href="#">World Clock</a>
          <a href="#">Pomodoro</a>
        </div>
      </div>
    </div>
    <div class="top-right">
      <button id="theme-toggle">🌙</button>
      <button id="settings">⚙️</button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside>
    <h2 class="logo">vClock</h2>
    <nav>
      <ul>
        <li class="active">Alarm Clock</li>
        <li>Timer</li>
        <li>Stopwatch</li>
        <li>Time</li>
      </ul>
    </nav>
    <hr>

    <!-- PayPal Donate Section -->
    <div class="donate-box">
      <h3>Support Us</h3>
      <div id="paypal-button-container"></div>
    </div>
  </aside>

  <!-- Main Content -->
  <main id="content">
    <div id="clock-container">
      <div id="clock" class="flip-clock"></div>
    </div>
  </main>

  <!-- Floating Controls -->
  <div class="floating-controls">
    <button id="share">🔗</button>
    <button id="zoom-out">➖</button>
    <button id="zoom-in">➕</button>
    <button id="fullscreen">⛶</button>
  </div>

  <!-- Settings Panel -->
  <div id="settings-panel" class="hidden">
    <h3>Clock Settings</h3>
    <label>
      Font Style:
      <select id="font-select">
        <option value="monospace">Digital</option>
        <option value="sans-serif">Sans Serif</option>
        <option value="serif">Serif</option>
        <option value="cursive">Cursive</option>
      </select>
    </label>
    <br><br>
    <label>
      Font Color:
      <input type="color" id="font-color" value="#00FF00">
    </label>
    <br><br>
    <label>
      Background Color:
      <input type="color" id="bg-color" value="#000000">
    </label>
    <br><br>
    <button id="reset-settings">Reset Defaults</button>
  </div>

  <!-- PayPal SDK -->
  <script src="https://www.paypal.com/sdk/js?client-id=YOUR_CLIENT_ID&currency=USD"></script>

  <!-- PayPal Button Script -->
  <script>
    paypal.Buttons({
      style: {
        color: 'gold',
        shape: 'pill',
        label: 'pay',
        height: 40
      },
      createOrder: function(data, actions) {
        return actions.order.create({
          purchase_units: [{
            amount: {
              value: '5.00' // Fixed donation amount
            }
          }]
        });
      },
      onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
          alert('Thank you, ' + details.payer.name.given_name + '! Payment completed.');
        });
      }
    }).render('#paypal-button-container');
  </script>

  <!-- App Script -->
  <script src="script.js"></script>
</body>
</html>
