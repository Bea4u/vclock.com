<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>vClock-clone • Online Clock, Alarm, Timer, Stopwatch</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1 class="brand">vClock • Clone</h1>
      <nav class="tabs">
        <button data-tab="clock" class="tab active">Clock</button>
        <button data-tab="alarm" class="tab">Alarm</button>
        <button data-tab="timer" class="tab">Timer</button>
        <button data-tab="stopwatch" class="tab">Stopwatch</button>
      </nav>
    </header>

    <section id="clock" class="panel visible">
      <div class="clock-display">
        <div id="time" class="time">00:00:00</div>
        <div id="date" class="date">—</div>
      </div>
      <div class="clock-controls">
        <label><input id="toggle24" type="checkbox"> Use 24-hour</label>
        <label><input id="showDate" type="checkbox" checked> Show date</label>
        <label><input id="nightMode" type="checkbox"> Night mode</label>
      </div>
    </section>

    <section id="alarm" class="panel">
      <h2>Alarm</h2>
      <div class="alarm-current">
        <div id="alarmList"></div>
      </div>
      <form id="addAlarmForm" class="alarm-form">
        <label>
          Time:
          <input id="alarmTime" type="time" required />
        </label>
        <label>
          Label:
          <input id="alarmLabel" type="text" placeholder="Wake up" />
        </label>
        <label>
          Repeat:
          <select id="alarmRepeat">
            <option value="once">Once</option>
            <option value="daily">Daily</option>
            <option value="weekdays">Weekdays</option>
          </select>
        </label>
        <button type="submit">Set Alarm</button>
      </form>
    </section>

    <section id="timer" class="panel">
      <h2>Timer</h2>
      <div class="timer-display">
        <div id="timerTime">00:00</div>
      </div>
      <div class="timer-controls">
        <input id="timerMinutes" type="number" min="0" value="1" /> minutes
        <button id="startTimer">Start</button>
        <button id="pauseTimer">Pause</button>
        <button id="resetTimer">Reset</button>
      </div>
    </section>

    <section id="stopwatch" class="panel">
      <h2>Stopwatch</h2>
      <div class="stopwatch-display">
        <div id="swTime">00:00.00</div>
      </div>
      <div class="stopwatch-controls">
        <button id="swStart">Start</button>
        <button id="swLap">Lap</button>
        <button id="swStop">Stop</button>
        <button id="swReset">Reset</button>
      </div>
      <ol id="laps" class="laps"></ol>
    </section>

    <footer class="footer">
      <small>Built with ❤️ — local-only alarm uses Web Audio and requires the page open.</small>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
