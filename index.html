<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>vClock • Clone</title>
  <meta name="description" content="vClock clone — clock, alarm, timer, stopwatch, world clock & pomodoro." />
  <link rel="stylesheet" href="style.css">
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- TOP BAR -->
  <header class="topbar">
    <div class="top-left">
      <button class="top-link">Holidays</button>
      <div class="tools-dropdown">
        <button class="top-link" id="toolsBtn">Tools ▾</button>
        <div class="tools-menu" id="toolsMenu" role="menu" aria-hidden="true">
          <button data-tool="world">World Clock</button>
          <button data-tool="online-timer">Online Timer</button>
          <button data-tool="pomodoro">Pomodoro</button>
        </div>
      </div>
    </div>

    <div class="top-right">
      <button id="themeToggle" class="icon-btn" aria-label="Toggle theme" title="Toggle theme">
        <!-- moon/sun icon -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/></svg>
      </button>
      <button id="settingsBtn" class="icon-btn" aria-label="Settings" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7z" fill="currentColor"/><path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1 1 0 0 0-1.1-.2 7.5 7.5 0 0 1-1.8.9 1 1 0 0 0-.8.9v.2a2 2 0 1 1-4 0v-.2a1 1 0 0 0-.8-.9 7.5 7.5 0 0 1-1.8-.9 1 1 0 0 0-1.1.2l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1 1 0 0 0 .2-1.1 7.5 7.5 0 0 1-.9-1.8 1 1 0 0 0-.9-.8H4a2 2 0 1 1 0-4h.2c.3 0 .6-.3.9-.8.3-.6.6-1.2.9-1.8a1 1 0 0 0-.2-1.1L6 3a2 2 0 1 1 2.8-2.8L9 0a1 1 0 0 0 1.1.2c.6.3 1.2.6 1.8.9.4.2.9.2 1.3 0 .6-.3 1.2-.6 1.8-.9A1 1 0 0 0 15 0h.2A2 2 0 1 1 18 4h-.2a1 1 0 0 0-.9.8c-.3.6-.6 1.2-.9 1.8-.2.4-.2.9 0 1.3.3.6.6 1.2.9 1.8.2.4.6.8.9 1.1z" fill="currentColor"/></svg>
      </button>
    </div>
  </header>

  <!-- APP LAYOUT -->
  <div class="app">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">vClock</div>
      <nav class="side-nav" role="navigation">
        <button class="nav-item active" data-tab="alarm">
          <svg class="nav-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M7 4v2H5v2h14V6h-2V4zM12 7a6 6 0 1 0 0 12 6 6 0 0 0 0-12z"/></svg>
          <span>Alarm Clock</span>
        </button>
        <button class="nav-item" data-tab="timer">
          <svg class="nav-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M15 2h-6v2h6V2zM12 8a6 6 0 1 0 .001 12.001A6 6 0 0 0 12 8zM11 11h2v5h-2z"/></svg>
          <span>Timer</span>
        </button>
        <button class="nav-item" data-tab="stopwatch">
          <svg class="nav-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M9 1h6v2H9zM12 6a9 9 0 1 0 0 18 9 9 0 0 0 0-18zM11 10h2v6h-2z"/></svg>
          <span>Stopwatch</span>
        </button>
        <button class="nav-item" data-tab="clock">
          <svg class="nav-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 20a8 8 0 1 0-.001-16.001A8 8 0 0 0 12 20zm1-13h-2v6l5 3 1-1.6-4-2.4z"/></svg>
          <span>Time</span>
        </button>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <!-- CLOCK panel -->
      <section id="clock" class="panel">
        <div class="display">
          <div id="time" class="time">00:00:00</div>
          <div id="date" class="date">—</div>
        </div>
        <div class="controls">
          <label class="switch"><input id="toggle24" type="checkbox"><span>Use 24-hour</span></label>
          <label class="switch"><input id="showDate" type="checkbox" checked><span>Show date</span></label>
          <label class="switch"><input id="nightMode" type="checkbox"><span>Night mode</span></label>
        </div>
      </section>

      <!-- ALARM panel -->
      <section id="alarm" class="panel hidden">
        <h2>Alarm</h2>
        <div id="alarmList" class="alarm-list"></div>
        <form id="addAlarmForm" class="alarm-form">
          <label>Time <input id="alarmTime" type="time" required></label>
          <label>Label <input id="alarmLabel" type="text" placeholder="Wake up"></label>
          <label>Repeat
            <select id="alarmRepeat">
              <option value="once">Once</option>
              <option value="daily">Daily</option>
              <option value="weekdays">Weekdays</option>
            </select>
          </label>
          <button class="btn" type="submit">Set Alarm</button>
        </form>
      </section>

      <!-- TIMER panel -->
      <section id="timer" class="panel hidden">
        <h2>Timer</h2>
        <div class="timer-display"><div id="timerTime" class="time-small">00:00</div></div>
        <div class="timer-controls">
          <input id="timerMinutes" type="number" min="0" value="1"> <span>minutes</span>
          <button id="startTimer" class="btn">Start</button>
          <button id="pauseTimer" class="btn">Pause</button>
          <button id="resetTimer" class="btn">Reset</button>
        </div>
      </section>

      <!-- STOPWATCH panel -->
      <section id="stopwatch" class="panel hidden">
        <h2>Stopwatch</h2>
        <div class="stopwatch-display"><div id="swTime" class="time-small">00:00.00</div></div>
        <div class="stopwatch-controls">
          <button id="swStart" class="btn">Start</button>
          <button id="swLap" class="btn">Lap</button>
          <button id="swStop" class="btn">Stop</button>
          <button id="swReset" class="btn">Reset</button>
        </div>
        <ol id="laps" class="laps" aria-live="polite"></ol>
      </section>

      <!-- TOOLS: World clock / Online timer / Pomodoro modals (hidden by default) -->
      <div id="toolsOverlay" class="tools-overlay hidden">
        <div class="tools-card">
          <button class="closeTools" id="closeTools">✕</button>
          <div id="toolContent">
            <!-- content injected by JS -->
          </div>
        </div>
      </div>
    </main>

    <!-- FLOATING ACTIONS -->
    <div class="float-actions">
      <button id="shareBtn" class="float-btn" title="Share"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7a3 3 0 0 0 0-1.41l7.02-4.11A2.99 2.99 0 1 0 14 4c0 .11.01.22.02.33L7 8.44A3 3 0 1 0 8.91 12.7l7.12 4.58c-.03.17-.03.35-.03.53a3 3 0 1 0 3-3z"/></svg></button>
      <button id="zoomOut" class="float-btn" title="Zoom out">−</button>
      <button id="zoomIn" class="float-btn" title="Zoom in">＋</button>
      <button id="fullScreen" class="float-btn" title="Fullscreen">⤢</button>
    </div>
  </div>

  <footer class="footer">Built with ❤️ — page must be open for alarm sounds.</footer>

  <script src="script.js"></script>
</body>
</html>
