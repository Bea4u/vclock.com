<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>World Clock — vClock Clone</title>

  <!-- SEO / OpenGraph (update urls/names if you host) -->
  <meta name="description" content="World clock — current time in major cities and timezones. Add and reorder clocks.">
  <meta property="og:title" content="What time is it — vClock Clone">
  <meta property="og:description" content="Live world clocks — add cities, reorder and share.">
  <link rel="canonical" href="https://your-site.example/time/">

  <link rel="stylesheet" href="style.css">
  <style>
    /* small page-specific overrides to keep everything self-contained */
    .row-clocks { display:flex; flex-wrap:wrap; gap:18px; }
    .clock-col { width: calc(25% - 18px); min-width:230px; }
    .panel-heading .title { display:inline-block; max-width:calc(100% - 64px); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tools { float:right; display:flex; gap:8px; align-items:center; }
    .font-digit { font-family: "Orbitron", monospace; font-weight:700; color:var(--accent); }
    .pm-menu { position:relative; }
    .pm-menu .dropdown-menu { position:absolute; right:0; top:28px; display:none; background:#222; border-radius:6px; padding:6px 8px; min-width:160px; box-shadow:0 8px 20px rgba(0,0,0,0.5); }
    .pm-menu.open .dropdown-menu { display:block; }
    .pm-menu .dropdown-menu a { display:block; padding:8px 10px; color:#eee; text-decoration:none; border-radius:4px; }
    .pm-menu .dropdown-menu a:hover{ background:rgba(255,255,255,0.02) }
    .add-panel { display:flex; gap:8px; align-items:center; }
    .add-panel input { flex:1; padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,0.06); }
    .add-panel button { padding:8px 12px;border-radius:6px;background:#0b6bd6;color:#fff;border:none;cursor:pointer }
  </style>
</head>
<body>

  <!-- top + sidebar are expected to exist globally (if not, this page still works standalone) -->
  <header class="topbar">
    <div class="left"> <a href="index.html">vClock Clone</a> </div>
    <div class="right"> <button id="theme-toggle">🌙</button> </div>
  </header>

  <aside class="sidebar">
    <div class="brand">vClock</div>
    <nav class="nav">
      <a class="nav-item" href="index.html">Alarm Clock</a>
      <a class="nav-item" href="timer.html">Timer</a>
      <a class="nav-item" href="stopwatch.html">Stopwatch</a>
      <a class="nav-item active" href="time.html">Time</a>
    </nav>
  </aside>

  <main id="main" style="margin-left:260px;padding:28px;">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div>
        <h1 style="margin:0;color:var(--accent);">World Clock</h1>
        <div class="subline">Current local time in popular cities</div>
      </div>
      <div style="text-align:right">
        <div id="nowbig" class="font-digit" style="font-size:34px"></div>
        <div class="subline" id="now-date" style="text-align:right"></div>
      </div>
    </div>

    <hr style="margin:18px 0 22px 0;border-color:rgba(255,255,255,0.03)">

    <section class="panel" style="margin-bottom:18px;">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h3 style="margin:0">Clocks</h3>
        <div class="add-panel">
          <input id="quick-search" placeholder="Search city or timezone (e.g. Europe/Paris)" />
          <button id="add-city-btn">➕ Add</button>
        </div>
      </div>
    </section>

    <section id="grid" class="row-clocks" aria-live="polite">
      <!-- JS will inject .clock-col blocks here -->
    </section>

    <section class="panel" style="margin-top:16px;">
      <p>More times available at <a href="https://vclock.com/time/" target="_blank">https://vclock.com/time/</a></p>
      <div style="margin-top:8px;" class="social-icons">
        <a href="#"><img src="icons/facebook.png" alt="Facebook"></a>
        <a href="#"><img src="icons/twitter.png" alt="Twitter"></a>
        <a href="#"><img src="icons/linkedin.png" alt="LinkedIn"></a>
        <a href="#"><img src="icons/reddit.png" alt="Reddit"></a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
/* ---------- page-specific world clock bootstrap ----------
   This code uses the global `worldCities` if present in script.js; otherwise uses fallback
------------------------------------------------------------*/
(function initTimePage(){
  // If script.js already created worldCities and renderWorldClock(), just call render
  if (typeof renderWorldClock === 'function') {
    renderWorldClock();
    return;
  }

  // fallback minimal renderer
  const grid = document.getElementById('grid');
  const cities = [
    { name: 'Local', zone: Intl.DateTimeFormat().resolvedOptions().timeZone, href:'#' },
    { name: 'UTC', zone: 'UTC', href:'#' },
    { name: 'New York, USA', zone: 'America/New_York', href:'#' },
    { name: 'London, United Kingdom', zone: 'Europe/London', href:'#' },
    { name: 'Tokyo, Japan', zone: 'Asia/Tokyo', href:'#' },
    { name: 'Sydney, Australia', zone: 'Australia/Sydney', href:'#' },
    { name: 'Lagos, Nigeria', zone: 'Africa/Lagos', href:'#' },
    { name: 'Beijing, China', zone: 'Asia/Shanghai', href:'#' }
  ];

  function makeCol(c){
    const div = document.createElement('div');
    div.className = 'clock-col panel';
    div.dataset.tz = c.zone;
    div.innerHTML = `
      <div class="panel-heading colored" style="display:flex;align-items:center;justify-content:space-between;">
        <div style="font-weight:700">${c.name}</div>
        <div class="tools"><a class="colored ext-link" href="${c.href}">⛶</a></div>
      </div>
      <div class="panel-body clock-body" data-tz="${c.zone}">
        <div class="colored digit text-nowrap text-center font-digit" style="font-size:28px">--:--:--</div>
        <div class="colored text-center" style="font-size:14px;opacity:0.8">–</div>
      </div>
    `;
    return div;
  }

  cities.forEach(c=>grid.appendChild(makeCol(c)));
  // update loop
  setInterval(()=> {
    const cols = grid.querySelectorAll('.clock-body');
    cols.forEach(b=>{
      const tz = b.dataset.tz || Intl.DateTimeFormat().resolvedOptions().timeZone;
      const now = new Date();
      try {
        const timeStr = now.toLocaleTimeString('en-US', { timeZone: tz, hour12:true, hour:'2-digit', minute:'2-digit', second:'2-digit' });
        b.querySelector('.font-digit').textContent = timeStr;
        const dateStr = now.toLocaleDateString('en-US', { timeZone: tz, weekday:'short', month:'short', day:'numeric' });
        b.querySelector('.text-center').textContent = dateStr;
      } catch(e) {
        b.querySelector('.font-digit').textContent = 'n/a';
        b.querySelector('.text-center').textContent = tz;
      }
    });
    // big clock
    const n = new Date();
    document.getElementById('nowbig').textContent = n.toLocaleTimeString();
    document.getElementById('now-date').textContent = n.toLocaleDateString();
  }, 1000);
})();
  </script>
</body>
</html>
