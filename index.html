<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vClock Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top Navigation -->
  <header>
    <div class="top-left">
      <a href="#">Holidays</a>
      <div class="dropdown">
        <button class="dropbtn">Tools ▼</button>
        <div class="dropdown-content">
          <a href="#">World Clock</a>
          <a href="#">Pomodoro</a>
        </div>
      </div>
    </div>
    <div class="top-right">
      <button id="theme-toggle">🌙</button>
      <button id="settings">⚙️</button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside>
    <h2 class="logo">vClock</h2>
    <nav>
      <ul>
        <li class="active">Alarm Clock</li>
        <li>Timer</li>
        <li>Stopwatch</li>
        <li>Time</li>
      </ul>
    </nav>
    <hr>

    <!-- PayPal Donate Section -->
    <div class="donate-box">
      <h3>Support Us</h3>
      <a href="https://www.paypal.me/JoyNance576" target="_blank" class="donate-link">
        Donate via PayPal
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <main id="content">
    <div id="clock"></div>
  </main>

  <!-- Floating Controls -->
  <div class="floating-controls">
    <button id="share">🔗</button>
    <button id="zoom-out">➖</button>
    <button id="zoom-in">➕</button>
    <button id="fullscreen">⛶</button>
  </div>

  <!-- Your Script -->
  <script src="script.js"></script>
</body>
</html>
