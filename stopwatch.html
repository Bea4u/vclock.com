<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopwatch - vClock Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="left"></div>
    <div class="right">
      <button id="theme-toggle">🌙</button>
      <button id="settings-btn">⚙️</button>
    </div>
  </header>

  <aside class="sidebar">
    <div class="brand">vClock</div>
    <nav class="nav">
      <a href="index.html" class="nav-item">Alarm Clock</a>
      <a href="timer.html" class="nav-item">Timer</a>
      <a href="stopwatch.html" class="nav-item active">Stopwatch</a>
      <a href="time.html" class="nav-item">Time</a>
    </nav>
  </aside>

  <main id="main">
    <div id="main-column">
      <div id="clock-container">
        <div id="clock-flat" class="stopwatch-display">00:00:00</div>
      </div>

      <section class="panel">
        <h3>Stopwatch Controls</h3>
        <button id="start-stopwatch">Start</button>
        <button id="stop-stopwatch">Stop</button>
        <button id="reset-stopwatch">Reset</button>
        <button id="lap-stopwatch">Lap</button>
        <ul id="laps"></ul>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
